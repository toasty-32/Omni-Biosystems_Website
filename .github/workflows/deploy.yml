name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container
        run: |
          gcloud builds submit backend/ \
            --tag asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/omni-biosystems/api:${{ github.sha }} --suppress-logs
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy omni-biosystems-api \
            --image asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/omni-biosystems/api:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --set-env-vars "ENVIRONMENT=production" \
            --set-env-vars "FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "^|^ALLOWED_ORIGINS=https://omni-biosystems.com,https://www.omni-biosystems.com"

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project omni-biosystems32
